name: CI - Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────
  # JOB 1: PHP Tests
  # ─────────────────────────────────────────
  test-php:
    name: 🧪 PHP Tests (Laravel)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, fileinfo, pdo, sqlite3, pdo_sqlite, bcmath, json, tokenizer, curl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-progress

      - name: Salin file .env
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Jalankan PHPUnit tests
        run: php artisan test --parallel

  # ─────────────────────────────────────────
  # JOB 2: Frontend Build & TypeScript Check
  # ─────────────────────────────────────────
  test-frontend:
    name: 🎨 Frontend Build (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build frontend assets (Vite)
        run: npm run build

  # ─────────────────────────────────────────
  # JOB 3: PHP Code Style (Laravel Pint)
  # ─────────────────────────────────────────
  lint-php:
    name: 🔍 PHP Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, json, tokenizer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Cek code style dengan Laravel Pint
        run: ./vendor/bin/pint --test
