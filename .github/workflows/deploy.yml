name: Deploy — Production

on:
  push:
    branches: [master]
  # Bisa juga trigger manual dari tab Actions di GitHub
  workflow_dispatch:

jobs:
  deploy:
    name: 🚀 Deploy ke Server
    runs-on: ubuntu-latest
    # Hanya jalan setelah CI berhasil
    needs: []

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets (Vite)
        run: npm run build

      # ─────────────────────────────────────────
      # Deploy ke server via SSH
      # Pastikan sudah set secrets di GitHub repo:
      #   Settings → Secrets and variables → Actions
      # ─────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Masuk ke direktori project di server
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull kode terbaru
            git pull origin master

            # Install/update Composer dependencies (tanpa dev)
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

            # Aktifkan maintenance mode
            php artisan down --refresh=15 --retry=60

            # Jalankan migrasi database
            php artisan migrate --force

            # Clear & cache semua config
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Restart queue workers
            php artisan queue:restart

            # Nonaktifkan maintenance mode
            php artisan up

            echo "✅ Deploy berhasil!"

  # ─────────────────────────────────────────
  # Notifikasi hasil deploy (opsional)
  # ─────────────────────────────────────────
  notify:
    name: 📣 Notifikasi Deploy
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Status deploy
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deploy ke production BERHASIL!"
          else
            echo "❌ Deploy ke production GAGAL!"
            exit 1
          fi
